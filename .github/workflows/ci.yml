name: CI

# Builds + tests the APK on every push to main and on PRs. Each push to main is
# published as a normal, versioned GitHub release (v0.1.<run>) so update trackers
# like Obtainium "just work" — no pre-releases, no "include prereleases" toggle,
# plain-semver versionName. The APK is also uploaded as a workflow artifact.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# `contents: write` is needed to publish releases. The publish step is gated to
# push-to-main, so PRs (and fork PRs, whose token is read-only) never touch them.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so the release step can build a changelog from the
          # commits since the previous release.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Default installs the legacy `tools` package, which drags in the
          # Android Emulator — a large, flaky download that failed CI at the setup
          # step ("ZipFile unknown archive"). We only build + unit-test, so
          # platform-tools is enough; the Android Gradle Plugin fetches the
          # platform + build-tools it needs on its own.
          packages: platform-tools

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore (optional)
        # If the secret isn't set the release APK is debug-signed — still
        # installable for testing. app/build.gradle.kts handles the fallback.
        env:
          KEYSTORE_B64: ${{ secrets.VELA_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/vela-release.jks"
            echo "Decoded release keystore."
          else
            echo "No keystore secret — release APK will be debug-signed."
          fi

      - name: Unit tests
        run: ./gradlew :core:test --no-daemon

      - name: Derive build version
        id: ver
        # versionName is plain semver (0.3.<run>) so Obtainium can compare it;
        # versionCode is 2000+run — monotonic and safely above earlier builds.
        # NOTE: bumped from 0.1.<run> / 1000+run on 2026-06-18 — local dev builds
        # had been hand-set with -PappVersionCode in the 1000s (up to 1117) and got
        # installed on a test phone, leaving it *ahead* of the release line so
        # Obtainium would reject the next release as a downgrade. 0.2 + 2000-base
        # steps the release line decisively over that pollution. Keep local dev
        # builds BELOW 1000 (e.g. -PappVersionCode=1) so this can't recur.
        run: |
          echo "name=0.3.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "code=$(( 2000 + ${{ github.run_number }} ))" >> "$GITHUB_OUTPUT"

      - name: Fetch TTS runtime AAR
        # sherpa-onnx neural-TTS runtime (the Piper voices). It's a 57 MB prebuilt AAR (no Maven
        # artifact) hosted on the fixed-tag `tts-runtime` release, gitignored out of the repo —
        # fetch it into app/libs/ so :app can package the arm64 .so. Verify the size so a truncated
        # download fails loud instead of producing a runtime-crashing APK.
        run: |
          mkdir -p app/libs
          # The `tts-runtime` release only lives on the upstream repo, so a FORK's CI (github.repository
          # = the fork) 404s. Try this repo first, then fall back to the upstream release.
          curl -fSL -o app/libs/sherpa-onnx-1.13.3.aar \
            "https://github.com/${{ github.repository }}/releases/download/tts-runtime/sherpa-onnx-1.13.3.aar" \
          || curl -fSL -o app/libs/sherpa-onnx-1.13.3.aar \
            "https://github.com/PimpinPumpkin/Vela/releases/download/tts-runtime/sherpa-onnx-1.13.3.aar"
          test "$(stat -c%s app/libs/sherpa-onnx-1.13.3.aar)" -gt 50000000

      - name: Build release APK
        env:
          VELA_KEYSTORE_PATH: ${{ runner.temp }}/vela-release.jks
          VELA_KEYSTORE_PASSWORD: ${{ secrets.VELA_KEYSTORE_PASSWORD }}
          VELA_KEY_ALIAS: ${{ secrets.VELA_KEY_ALIAS }}
        run: >
          ./gradlew :app:assembleRelease --no-daemon
          -PappVersionName=${{ steps.ver.outputs.name }}
          -PappVersionCode=${{ steps.ver.outputs.code }}
          -PmaptilerKey=${{ secrets.MAPTILER_KEY }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vela-maps-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Publish nightly (prerelease)
        # Every push to main → a PRERELEASE (the nightly channel). Obtainium users who
        # want nightlies turn on "include prereleases"; everyone else keeps tracking the
        # latest stable release, which the weekly promote-stable workflow produces by
        # flipping the newest healthy nightly to a full release (same APK, no rebuild).
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="0.3.${{ github.run_number }}"
          cp app/build/outputs/apk/release/app-release.apk "vela-maps-v${VER}.apk"
          # Build the changelog from the commit subjects since the previous release. Our commit
          # subjects are written as plain-language changelog lines, so this reads as real release
          # notes (what Obtainium shows people), not a raw hash dump.
          PREV="$(git tag -l 'v0.[0-9]*' --sort=-v:refname | head -n1)"
          if [ -n "$PREV" ]; then
            LOG="$(git log --no-merges --pretty=format:'- %s' "${PREV}..HEAD")"
            COMPARE="**Full changelog:** https://github.com/${{ github.repository }}/compare/${PREV}...v${VER}"
          else
            LOG="$(git log --no-merges --pretty=format:'- %s' -n 20 HEAD)"
            COMPARE=""
          fi
          [ -z "$LOG" ] && LOG="- Maintenance and internal changes"
          NOTES="$(printf 'What'\''s changed in %s\n\n%s\n\n%s\n' "$VER" "$LOG" "$COMPARE")"
          gh release create "v${VER}" \
            --title "Vela $VER" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --notes "$NOTES" \
            "vela-maps-v${VER}.apk"

      - name: Prune old nightlies
        # Keep the releases page readable: nightlies pile up fast (one per push), so
        # everything past the newest 14 PRERELEASES gets deleted, tag included. Stable
        # releases are never prereleases (the promote workflow flips the flag), so the
        # stable history is untouched, and so is anything a user currently tracks.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 200 --json tagName,isPrerelease \
            -q '[.[] | select(.isPrerelease)] | .[14:] | .[].tagName' |
          while read -r tag; do
            [ -n "$tag" ] || continue
            echo "pruning nightly $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          done
